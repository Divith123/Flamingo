# Docker Compose for flamingo
# Full-stack container orchestration

name: flamingo

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: flamingo-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3001
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - flamingo-network

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: flamingo-server
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/flamingo
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - flamingo-network

  db:
    image: postgres:16-alpine
    container_name: flamingo-postgres
    environment:
      POSTGRES_DB: flamingo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - flamingo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - flamingo-network

networks:
  flamingo-network:
    driver: bridge

volumes:
  flamingo_postgres_data:
